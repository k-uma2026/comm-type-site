<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>診断結果 | SMタイプ診断</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="result-wrap">
    <section id="resultCard" class="result-card rank-SSR">
      <div class="result-card-inner">
        <div class="result-glow"></div>

        <div class="card-header">
          <div id="typeSymbol" class="type-symbol">👑</div>
          <div id="typeName" class="type-name">受けの王</div>
          <div id="typeCode" class="type-code">FCSK</div>
        </div>

        <div class="card-grid">
          <div class="ms-box">
            <div class="ms-item">
              <span>M度</span>
              <strong id="mValue">72</strong>
            </div>
            <div class="ms-item">
              <span>S度</span>
              <strong id="sValue">41</strong>
            </div>
          </div>

          <div class="title-box">
            <div class="title-label">称号</div>
            <div id="titleName" class="title-name">駆け引き上手</div>
          </div>
        </div>

        <div class="card-bottom">
          <div class="rank-badge">
            <span id="rankIcon" class="rank-icon">⭐</span>
            <span id="rankValue">UR+</span>
          </div>
          <div id="awakeningText" class="awakening-text"></div>
        </div>

        <div class="share-footer">SMタイプ診断</div>
      </div>
    </section>

    <section class="detail-card">
      <h2>タイプ詳細</h2>
      <div id="typeCatch" class="type-catch"></div>
      <div id="typeDesc" class="type-desc"></div>
    </section>

    <section class="detail-card">
      <h2>F / L / C / X / S / V / K / R バランス</h2>
      <div class="bar-block">
        <div class="bar-head"><span>F</span><span id="fVal">0</span></div>
        <div class="single-bar"><div id="barF" class="fill-bar"></div></div>
      </div>
      <div class="bar-block">
        <div class="bar-head"><span>L</span><span id="lVal">0</span></div>
        <div class="single-bar"><div id="barL" class="fill-bar"></div></div>
      </div>
      <div class="bar-block">
        <div class="bar-head"><span>C</span><span id="cVal">0</span></div>
        <div class="single-bar"><div id="barC" class="fill-bar"></div></div>
      </div>
      <div class="bar-block">
        <div class="bar-head"><span>X</span><span id="xVal">0</span></div>
        <div class="single-bar"><div id="barX" class="fill-bar"></div></div>
      </div>
      <div class="bar-block">
        <div class="bar-head"><span>S</span><span id="sAxisVal">0</span></div>
        <div class="single-bar"><div id="barSAxis" class="fill-bar"></div></div>
      </div>
      <div class="bar-block">
        <div class="bar-head"><span>V</span><span id="vVal">0</span></div>
        <div class="single-bar"><div id="barV" class="fill-bar"></div></div>
      </div>
      <div class="bar-block">
        <div class="bar-head"><span>K</span><span id="kVal">0</span></div>
        <div class="single-bar"><div id="barK" class="fill-bar"></div></div>
      </div>
      <div class="bar-block">
        <div class="bar-head"><span>R</span><span id="rVal">0</span></div>
        <div class="single-bar"><div id="barR" class="fill-bar"></div></div>
      </div>
    </section>

    <section class="detail-card">
      <h2>SM座標</h2>
      <div class="sm-chart-wrap">
        <canvas id="smChart"></canvas>
      </div>
    </section>

    <section class="action-row">
      <button id="saveImageBtn" class="primary-btn">画像を保存</button>
      <button id="shareXBtn" class="ghost-btn">Xでシェア</button>
      <a href="./quiz.html" class="ghost-btn link-btn">もう一度診断する</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="./types.js"></script>
  <script src="./share.js"></script>
  <script src="./app.js"></script>
</body>
</html>
